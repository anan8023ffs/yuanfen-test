<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正缘城市 专属深度测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
        }

        body {
            min-height: 100vh;
            color: #4a3f35;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background:
                radial-gradient(circle at 10% 10%, rgba(255,255,255,0.95), transparent 28%),
                radial-gradient(circle at 90% 18%, rgba(255,228,235,0.9), transparent 32%),
                radial-gradient(circle at 15% 85%, rgba(255,245,230,0.9), transparent 32%),
                linear-gradient(135deg, #fff7fb 0%, #ffeaf2 45%, #f6dce3 100%);
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.85);
            border-radius: 24px;
            padding: 38px 32px;
            box-shadow:
                0 18px 45px rgba(190, 155, 165, 0.25),
                0 8px 18px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            font-size: 25px;
            color: #b76e79;
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .desc {
            text-align: center;
            color: #8a7f74;
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.7;
        }

        .auth-box {
            display: block;
        }

        .input-box {
            margin: 24px 0;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            background: rgba(255,255,255,0.86);
            border: 1px solid rgba(219, 172, 182, 0.45);
            border-radius: 14px;
            color: #4a3f35;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #c98f9b;
            background: #fffafb;
            box-shadow: 0 0 0 3px rgba(201, 143, 155, 0.15);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #d48f9c, #e8aeb7);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            opacity: 0.92;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(212, 143, 156, 0.35);
        }

        .tip {
            color: #e07a8a;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            height: 20px;
        }

        .quiz-box {
            display: none;
        }

        .q-num {
            text-align: right;
            color: #b76e79;
            font-size: 14px;
            margin-bottom: 22px;
            font-weight: 500;
        }

        .q-title {
            font-size: 19px;
            line-height: 1.7;
            margin-bottom: 32px;
            text-align: center;
            color: #4a3f35;
        }

        .option-item {
            background: rgba(255,255,255,0.78);
            border: 1px solid rgba(219, 172, 182, 0.35);
            border-radius: 14px;
            padding: 17px 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: #5a4f45;
        }

        .option-item:hover {
            background: #fff0f4;
            border-color: #d48f9c;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(212, 143, 156, 0.25);
        }

        .option-item:active {
            transform: scale(0.98);
        }

        .result-box {
            display: none;
        }

        .result-title {
            font-size: 22px;
            color: #b76e79;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .result-city {
            font-size: 26px;
            font-weight: 800;
            color: #d48f9c;
            text-align: center;
            margin-bottom: 24px;
        }

        .result-content {
            line-height: 2;
            color: #6b5f55;
            font-size: 15px;
            text-align: justify;
        }

        /* 预留数字位置样式 */
        .num-box {
            margin-top: 25px;
            text-align: center;
            font-size: 16px;
            color: #b76e79;
            font-weight: 600;
        }

        .restart-btn {
            margin-top: 32px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 24px;
            }
            h1 {
                font-size: 22px;
            }
            .q-title {
                font-size: 17px;
            }
            .result-city {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 授权页面 -->
        <div class="auth-box" id="authPage">
            <h1>正缘城市 深度测试</h1>
            <p class="desc">凭第一直觉作答，探寻你的缘分所在地<br>本测试为付费专属内容，请输入授权码解锁</p>
            <div class="input-box">
                <input type="text" id="authCode" placeholder="请输入专属授权码">
            </div>
            <button class="btn" onclick="checkAuth()">立即验证并进入测试</button>
            <div class="tip" id="authTip"></div>
        </div>

        <!-- 答题页面 -->
        <div class="quiz-box" id="quizPage">
            <div class="q-num" id="questionNum">第 1 题 / 共 15 题</div>
            <div class="q-title" id="questionTitle"></div>
            <div id="optionsBox"></div>
        </div>

        <!-- 结果页面 -->
        <div class="result-box" id="resultPage">
            <h2 class="result-title">你的专属正缘城市</h2>
            <div class="result-city" id="resultCity"></div>
            <div class="result-content" id="resultText"></div>

            <!-- ========== 在这里填写你的数字/联系方式 ========== -->
            <div class="num-box">
                als806688
            </div>
            <!-- ============================================== -->

            <button class="btn restart-btn" onclick="restartTest()">重新测试</button>
        </div>
    </div>

    <script>
        // 固定授权码
        const correctCode = "202608";

        // 15道测试题目
        const questionList = [
            {title: "闲暇时光，你更倾向于做什么？", opt: ["A. 宅家安静独处", "B. 约好友出门玩乐", "C. 规划短途旅行", "D. 学习提升自我"]},
            {title: "四季之中，你最喜欢哪种天气？", opt: ["A. 温柔阴雨", "B. 明媚晴天", "C. 清爽大风天", "D. 微凉多云天"]},
            {title: "日常饮食，你的口味偏向？", opt: ["A. 清淡本味", "B. 香辣浓郁", "C. 酸甜可口", "D. 咸香厚重"]},
            {title: "你内心向往怎样的生活节奏？", opt: ["A. 安稳慢节奏", "B. 热闹充实", "C. 自由随性", "D. 紧凑上进"]},
            {title: "出游时，更偏爱哪一类自然风光？", opt: ["A. 湖泊平原", "B. 高山峻岭", "C. 大海沙滩", "D. 森林幽谷"]},
            {title: "面对陌生社交，你属于哪一类？", opt: ["A. 慢热内向", "B. 开朗健谈", "C. 佛系随缘", "D. 谨慎观望"]},
            {title: "远距离出行，你的首选交通方式？", opt: ["A. 高铁动车", "B. 自驾车辆", "C. 飞机航班", "D. 大巴客车"]},
            {title: "欣赏建筑，你更喜欢哪种风格？", opt: ["A. 江南雅致古风", "B. 北方大气古城", "C. 现代都市风", "D. 简约文艺风"]},
            {title: "待人接物，你的性格底色是？", opt: ["A. 温柔细腻", "B. 直爽洒脱", "C. 活泼机灵", "D. 沉稳内敛"]},
            {title: "如果长期定居，优先选择？", opt: ["A. 宜居二线城市", "B. 繁华一线城市", "C. 安逸小众小城", "D. 静谧乡镇"]},
            {title: "节日里，你喜欢怎样的氛围？", opt: ["A. 家人小聚温馨", "B. 多人欢聚热闹", "C. 新鲜有趣玩法", "D. 安静独自度过"]},
            {title: "日常穿搭，你的风格偏向？", opt: ["A. 简约素雅", "B. 休闲随性", "C. 潮流时尚", "D. 复古文艺"]},
            {title: "睡前大部分时间会做？", opt: ["A. 追剧看书放松", "B. 和亲友聊天", "C. 放空发呆", "D. 规划次日事项"]},
            {title: "面对新鲜事物，你的态度是？", opt: ["A. 偏爱安稳不喜改变", "B. 乐于主动尝试", "C. 新旧都可接受", "D. 观望后再决定"]},
            {title: "你心中理想的约会地点？", opt: ["A. 书店/茶馆等安静场所", "B. 餐厅/夜市等美食地", "C. 景区/游乐园", "D. 户外散步公园"]}
        ];

        // 15套独立结果（每套=两个不同省份+城市+解读）
        const resultList = [
            {city: "浙江 · 江苏", text: "你的正缘出现在浙江与江苏。对方性情温婉儒雅，生活精致注重仪式感。你们大概率通过工作合作、朋友介绍相识，感情细水长流，相处满是温柔与惬意。"},
            {city: "四川 · 重庆", text: "你的正缘位于四川与重庆。对方热情爽朗、幽默有趣，自带烟火气息。聚会、旅行或是日常玩乐都会成为你们的邂逅契机，相处轻松快乐，缘分浓烈又真挚。"},
            {city: "广东 · 福建", text: "你的正缘在广东深圳与福建厦门。对方眼界开阔、行动力强，敢于追逐梦想。出差、旅行、异地交流是相遇的主要方式，跨越距离的缘分，终将双向奔赴。"},
            {city: "北京 · 陕西", text: "你的正缘来自北京与陕西西安。对方沉稳可靠、有担当，三观端正踏实。多因学业、事业结缘，感情循序渐进，一旦确定关系，便会长久相守不离不弃。"},
            {city: "湖南 · 湖北", text: "你的正缘在湖南长沙与湖北武汉。对方性格外向、思维活跃，热爱生活也善于交际。常在商圈、娱乐场所或同城活动中相遇，相处热闹有趣，默契十足。"},
            {city: "山东 · 辽宁", text: "你的正缘地处山东青岛与辽宁大连。对方大气豪爽、心胸开阔，待人真诚实在。海边出行、商务往来容易邂逅彼此，性格互补，感情安稳又暖心。"},
            {city: "安徽 · 江西", text: "你的正缘在安徽合肥与江西南昌。对方温和内敛、心思细腻，待人谦和有礼。邻里、同事、亲友圈子是相遇之地，感情平淡却温暖，细水长流走到最后。"},
            {city: "云南 · 贵州", text: "你的正缘位于云南昆明与贵州贵阳。对方热爱自由、随性浪漫，向往慢生活。旅行、旅居、特色活动会让你们相遇，彼此欣赏对方的洒脱，缘分浪漫又自由。"},
            {city: "海南 · 广西", text: "你的正缘在海南海口与广西南宁。对方乐观开朗、温柔善良，热爱自然与生活。度假、旅居、户外游玩是相遇契机，相处氛围轻松治愈，幸福感满满。"},
            {city: "河南 · 河北", text: "你的正缘来自河南郑州与河北石家庄。对方朴实真诚、勤奋上进，责任感极强。工作打拼、同乡聚会容易相识，感情脚踏实地，稳步走向未来。"},
            {city: "上海 · 浙江", text: "你的正缘在上海与浙江宁波。对方时尚前卫、思路灵活，追求高品质生活。都市商圈、行业交流中邂逅，两人旗鼓相当，是势均力敌的美好缘分。"},
            {city: "吉林 · 黑龙江", text: "你的正缘地处吉林长春与黑龙江哈尔滨。对方热情直爽、仗义暖心，性格大方不拘小节。冰雪文旅、北方同城活动容易相遇，相处直白热烈，真心相待。"},
            {city: "广东 · 广东", text: "你的正缘在广东广州与珠海。对方务实能干、情商出众，懂生活也懂打拼。商贸往来、日常社交中相识，彼此扶持，事业与爱情可以同步收获。"},
            {city: "江苏 · 浙江", text: "你的正缘位于江苏南京与浙江温州。对方聪慧机敏、心思缜密，兼具文雅与果敢。文化场所、商务场合容易结缘，灵魂契合，精神共鸣感极强。"},
            {city: "甘肃 · 宁夏", text: "你的正缘在甘肃兰州与宁夏银川。对方淳朴善良、坚韧踏实，待人重情重义。异地务工、地域交流活动中相遇，感情纯粹真挚，相守安稳长久。"}
        ];

        let currentQ = 0;
        let score = {A: 0, B: 0, C: 0, D: 0};

        // 授权校验
        function checkAuth() {
            let inputVal = document.getElementById("authCode").value.trim();
            let tip = document.getElementById("authTip");
            if (inputVal === "") {
                tip.innerText = "请输入授权码";
                return;
            }
            if (inputVal !== correctCode) {
                tip.innerText = "授权码无效，请重新核对";
                return;
            }
            document.getElementById("authPage").style.display = "none";
            document.getElementById("quizPage").style.display = "block";
            currentQ = 0;
            loadQuestion();
        }

        // 加载题目
        function loadQuestion() {
            let q = questionList[currentQ];
            document.getElementById("questionNum").innerText = `第 ${currentQ + 1} 题 / 共 15 题`;
            document.getElementById("questionTitle").innerText = q.title;
            let box = document.getElementById("optionsBox");
            box.innerHTML = "";
            q.opt.forEach((item, idx) => {
                let div = document.createElement("div");
                div.className = "option-item";
                div.innerText = item;
                div.onclick = function () {
                    selectOption(idx);
                };
                box.appendChild(div);
            });
        }

        // 选择选项计分 自动翻页
        function selectOption(idx) {
            let key = ["A", "B", "C", "D"][idx];
            score[key]++;
            currentQ++;
            if (currentQ >= questionList.length) {
                showResult();
            } else {
                loadQuestion();
            }
        }

        // 计算并展示结果
        function showResult() {
            document.getElementById("quizPage").style.display = "none";
            document.getElementById("resultPage").style.display = "block";

            let a = score.A, b = score.B, c = score.C, d = score.D;
            let resIndex = 0;

            if(a >= 8) resIndex = 0;
            else if(b >= 8) resIndex = 1;
            else if(c >= 8) resIndex = 2;
            else if(d >= 8) resIndex = 3;
            else if(a === 7) resIndex = 4;
            else if(b === 7) resIndex = 5;
            else if(c === 7) resIndex = 6;
            else if(d === 7) resIndex = 7;
            else if(a === 6) resIndex = 8;
            else if(b === 6) resIndex = 9;
            else if(c === 6) resIndex = 10;
            else if(d === 6) resIndex = 11;
            else if(a === 5) resIndex = 12;
            else if(b === 5) resIndex = 13;
            else resIndex = 14;

            let res = resultList[resIndex];
            document.getElementById("resultCity").innerText = res.city;
            document.getElementById("resultText").innerText = res.text;
        }

        // 重新测试
        function restartTest() {
            currentQ = 0;
            score = {A: 0, B: 0, C: 0, D: 0};
            document.getElementById("resultPage").style.display = "none";
            document.getElementById("authPage").style.display = "block";
            document.getElementById("authCode").value = "";
            document.getElementById("authTip").innerText = "";
        }
    </script>
</body>
</html>
