<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(238, 156, 167, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            text-align: center;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        h1 {
            color: #c27ba0;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .input-group {
            margin: 20px 0;
        }

        input {
            width: 80%;
            padding: 12px;
            border: 2px solid #ee9ca7;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #ee9ca7, #c27ba0);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(194, 123, 160, 0.4);
        }

        .question {
            font-size: 18px;
            color: #555;
            margin: 20px 0;
            line-height: 1.6;
        }

        .options {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }

        .option {
            background: #fff;
            border: 2px solid #ee9ca7;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            color: #555;
        }

        .option:hover {
            background: #ffdde1;
            border-color: #c27ba0;
            color: #c27ba0;
        }

        .progress {
            color: #c27ba0;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 22px;
            color: #c27ba0;
            margin-bottom: 15px;
        }

        .result-province {
            font-size: 20px;
            color: #ee9ca7;
            font-weight: bold;
            margin: 10px 0;
        }

        .result-text {
            color: #666;
            line-height: 1.8;
            margin: 20px 0;
            text-align: left;
            padding: 0 10px;
        }

        .contact-info {
            color: #c27ba0;
            font-size: 16px;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>

        let currentQuestion = 0;
        let totalScore = 0;

        // 初始化题目页面
        function initQuestions() {
            const container = document.getElementById('questionPages');
            questions.forEach((q, index) => {
                const page = document.createElement('div');
                page.className = 'page';
                page.id = `question-${index}`;
                page.innerHTML = `
                    <div class="progress">进度：${index + 1}/${questions.length}</div>
                    <div class="question">${q.q}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${index}, ${i})">${opt}</div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(page);
            });
        }

        // 选择选项
        function selectOption(questionIndex, optionIndex) {
            totalScore += optionIndex;
            document.getElementById(`question-${questionIndex}`).classList.remove('active');
            currentQuestion++;
            if (currentQuestion < questions.length) {
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
            } else {
                showResult();
            }
        }

        // 显示结果
        function showResult() {
            document.getElementById('resultPage').classList.add('active');
            const resultIndex = Math.floor(totalScore / 8) % results.length;
            const result = results[resultIndex];
            document.getElementById('provinceResult').textContent = `${result.provinces[0]} + ${result.provinces[1]}`;
            document.getElementById('resultText').textContent = result.text;
        }

        // 检查授权码
        function checkAuth() {
            const inputCode = document.getElementById('authCode').value;
            if (inputCode === CORRECT_AUTH_CODE) {
                document.getElementById('authPage').classList.remove('active');
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
            } else {
                alert('授权码错误，请重新输入');
            }
        }

        // 重新测试
        function restartTest() {
            currentQuestion = 0;
            totalScore = 0;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('authCode').value = '';
            document.getElementById('authPage').classList.add('active');
        }

        // 页面加载完成初始化
        window.onload = function() {
            initQuestions();
        };
    </script>
